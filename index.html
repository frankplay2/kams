<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cámaras Demo</title>

<!-- Evitar cache -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<style>
body{
margin:0;
background:#111;
font-family:Arial;
color:white;
text-align:center;
}

h1{
padding:15px;
margin:0;
background:#000;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
padding:10px;
}

.cam{
background:#222;
padding:10px;
border-radius:10px;
}

img{
width:100%;
border-radius:10px;
}

.time{
color:#0f0;
font-size:14px;
margin-top:5px;
}
</style>
</head>

<body>

<h1>📷 LF ELEKTRO CCTV DEMO</h1>

<div class="grid">

<div class="cam">
<h2>Cámara 1</h2>
<img id="cam1" src="cam1.jpg">
<div class="time" id="t1"></div>
</div>

<div class="cam">
<h2>Cámara 2</h2>
<img id="cam2" src="cam2.jpg">
<div class="time" id="t2"></div>
</div>

</div>

<script>
function actualizar(){

let t = Date.now();

const cam1 = document.getElementById("cam1");
const cam2 = document.getElementById("cam2");

// FORZAR reload real
cam1.src = "";
cam2.src = "";

setTimeout(() => {
    cam1.src = "cam1.jpg?v=" + t;
    cam2.src = "cam2.jpg?v=" + t;
}, 50);

// tiempo
let hora = new Date().toLocaleTimeString();
document.getElementById("t1").innerHTML = "Actualizado: " + hora;
document.getElementById("t2").innerHTML = "Actualizado: " + hora;

}

setInterval(actualizar, 5000);
actualizar();
</script>

</body>
</html>
